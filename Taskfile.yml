version: "3"

tasks:
  default:
    desc: Build + test
    deps: [test]

  test:
    desc: Build and run unit + property tests
    cmds:
      - mkdir -p build
      - corral run -- ponyc --path . -o build test/
      - ./build/test

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf build _corral
